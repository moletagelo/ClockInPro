name: Build and Release APK

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Show directory
      run: |
        echo "=== Directory listing ==="
        ls -la
        echo "=== App directory ==="
        ls -la app/

    - name: Build Debug APK
      run: |
        echo "=== Starting build ==="
        ./gradlew clean assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle_output.txt
        BUILD_RESULT=$?
        echo "=== Build exit code: $BUILD_RESULT ==="
        echo "=== Checking for APK ==="
        find app/build -name "*.apk" -type f

    - name: Upload Gradle output
      uses: actions/upload-artifact@v4
      with:
        name: gradle-output
        path: gradle_output.txt
      if: always()

    - name: List APK files
      run: |
        echo "=== APK files found ==="
        find . -name "*.apk" -type f
        ls -lh app/build/outputs/apk/debug/ 2>&1 || echo "No debug APK directory"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ClockInPro-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7
      if: success()
