name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 || true

    - name: Check build output
      run: |
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          echo "APK built successfully!"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
        else
          echo "APK not found. Listing build directory:"
          ls -la app/build/ 2>/dev/null || echo "Build directory does not exist"
          ls -la app/build/outputs/ 2>/dev/null || echo "Outputs directory does not exist"
        fi
