name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    timeout-minutes: 20
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools
        curl -sLO https://dl.google.com/android/repository/commandlinetools-mac-11076708_latest.zip
        unzip -q commandlinetools-mac-11076708_latest.zip
        mv cmdline-tools latest
        rm commandlinetools-mac-11076708_latest.zip
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
    
    - name: Build Debug APK
      env:
        ANDROID_HOME: ${{ env.HOME }}/android-sdk
        PATH: ${{ env.PATH }}:$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools
      run: |
        chmod +x gradlew
        ./gradlew clean assembleDebug --no-daemon
        ls -la app/build/outputs/apk/debug/ || echo "APK directory not found"
    
    - name: Upload APK
      run: |
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          echo "APK found, uploading..."
        else
          echo "APK not found, checking directory..."
          find app/build -name "*.apk" -type f
        fi
      shell: bash
    
    - name: Upload APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ClockInPro-v1.1
        path: app/build/outputs/apk/debug/
