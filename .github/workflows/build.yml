name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    
    - uses: android-actions/setup-android@v2
    
    - name: Build
      run: |
        chmod +x gradlew
        ./gradlew clean assembleDebug --no-daemon 2>&1 || {
          echo "Build failed, trying without clean..."
          ./gradlew assembleDebug --no-daemon 2>&1
        }
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: ClockInPro-v1.1
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: ClockInPro-v1.1
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: app-debug.apk
        tag_name: v1.1
        name: "ClockInPro v1.1"
        body: "Android打卡应用 v1.1 - 添加游客模式"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
