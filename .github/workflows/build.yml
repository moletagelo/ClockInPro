name: Build and Release APK

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Clean build
      run: ./gradlew clean --no-daemon

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -100

    - name: Check Debug APK
      run: |
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "✅ Debug APK found!"
        else
          echo "❌ Debug APK NOT found!"
          find app/build -name "*.apk" 2>/dev/null || echo "No APK files found"
          exit 1
        fi

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 5

    - name: Build Release APK
      if: github.event_name == 'release'
      run: ./gradlew assembleRelease --no-daemon --info 2>&1 | tail -100

    - name: Upload Release APK
      if: github.event_name == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/*.apk
        body: "Automated release APK build"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
